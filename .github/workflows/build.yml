name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: x64
            target: mac-x64
          - os: macos-latest
            arch: arm64
            target: mac-arm64
          - os: windows-latest
            arch: x64
            target: win-x64
          - os: ubuntu-latest
            arch: x64
            target: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Generate icons
        run: python3 scripts/generate-icons.py

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --${{ matrix.target == 'win-x64' && 'win' || contains(matrix.target, 'mac') && 'mac' || 'linux' }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omniemu-${{ matrix.target }}
          path: release/*.dmg
          if-no-files-found: ignore

  
